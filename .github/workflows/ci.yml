name: Mobile Tests CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  android-tests:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download Android app
        run: |
          mkdir -p apps
          curl -L -o apps/android.wdio.native.app.v2.0.0.apk \
            "https://github.com/webdriverio/native-demo-app/releases/download/v2.0.0/android.wdio.native.app.v2.0.0.apk"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run mobile tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          profile: pixel_7_pro
          arch: x86_64
          script: |
            export ANDROID_DEVICE=emulator-5554
            export ANDROID_APP=android.wdio.native.app.v2.0.0.apk
            mkdir -p reports/allure-results reports/screenshots
            npm test

      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p reports/allure-results
          npx allure generate reports/allure-results -o reports/allure-report --clean || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-reports-android
          path: reports/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-android
          path: reports/screenshots/

  ios-tests:
    name: iOS
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download iOS app
        run: |
          mkdir -p apps
          curl -L -o apps/ios.simulator.wdio.native.app.v2.0.0.zip \
            "https://github.com/webdriverio/native-demo-app/releases/download/v2.0.0/ios.simulator.wdio.native.app.v2.0.0.zip"

      - name: Run mobile tests on iOS simulator
        env:
          IOS_DEVICE: "iPhone 15"
          IOS_VERSION: "18.5"
          IOS_APP: "ios.simulator.wdio.native.app.v2.0.0.zip"
        run: |
          mkdir -p reports/allure-results reports/screenshots
          npm run ios.app

      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p reports/allure-results
          npx allure generate reports/allure-results -o reports/allure-report --clean || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-reports-ios
          path: reports/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-ios
          path: reports/screenshots/

  deploy-report:
    name: Deploy Allure to GitHub Pages
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [android-tests, ios-tests]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download Android report
        uses: actions/download-artifact@v4
        with:
          name: allure-reports-android
          path: android-reports

      - name: Download iOS report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-reports-ios
          path: ios-reports

      - name: Merge Allure results and generate report
        run: |
          mkdir -p reports/allure-results
          cp -r android-reports/allure-results/. reports/allure-results/ 2>/dev/null || true
          if [ -d ios-reports/allure-results ]; then
            cp -r ios-reports/allure-results/. reports/allure-results/ 2>/dev/null || true
          fi
          npx allure generate reports/allure-results -o reports/allure-report --clean

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
